# Security response headers, factored out so they can be re-declared in the
# locations that set their own add_header (see the add_header inheritance note in
# nginx.conf.template). `always` ensures they're sent on error responses too.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options        "DENY"    always;
add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

# Only honoured over HTTPS; inert on a plain-HTTP run, active behind TLS.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# style-src allows inline styles because the app positions cursors and colour
# swatches with inline style={{}}. Everything else is same-origin only.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
